<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>30 Days Of JavaScript Challenge Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>30 Days Of JavaScript Challenge Leaderboard</h1>

  <div class="form">
    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="lastName" placeholder="Last Name">
    <input type="text" id="country" placeholder="Country">
    <input type="number" id="score" placeholder="Player Score">
    <button id="addBtn">Add Player</button>
  </div>

  <p id="warning" class="warning">All fields are required.</p>

  <div id="leaderboard"></div>

  <script src="script.js"></script>
</body>
</html>
