<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Countries Data</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>World Countries Data</h1>
  <h2 id="subtitle">Currently, we have 250 countries</h2>

  <input type="text" id="search" placeholder="Search countries by name, city and languages">
  <div class="buttons">
    <button id="nameBtn">NAME</button>
    <button id="capitalBtn">CAPITAL</button>
    <button id="populationBtn">POPULATION</button>
  </div>

  <div id="countriesContainer"></div>
  <div id="chartContainer"></div>

  <script src="script.js"></script>
</body>
</html>
